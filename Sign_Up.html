<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Coffee - Login</title>
    <link rel="stylesheet" href="sign_up.css">
</head>

<body>

    <div class="auth-container">

        <div class="auth-header">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=800">
            <div class="overlay-text">
                <h1>Cafe Coffee</h1>
            </div>
        </div>

        <div class="auth-tabs">

            <input type="radio" name="auth" id="signin" checked>
            <input type="radio" name="auth" id="signup">

            <div class="tab-links">
                <label for="signin">Sign In</label>
                <label for="signup">Sign Up</label>
            </div>

            <div class="form-wrapper">

                <!-- LOGIN -->
                <form class="auth-form" id="login-form">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <button class="auth-btn">Welcome Back</button>
                </form>

                <!-- SIGNUP -->
                <form class="auth-form" id="register-form">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="Address">
                    <input type="tel" placeholder="Phone Number">
                    <input type="password" placeholder="Create Password" required>
                    <button class="auth-btn">Join Now</button>
                </form>

            </div>
        </div>
    </div>

    <script>

        // SIGNUP
        document.getElementById("register-form").addEventListener("submit", function (e) {
            e.preventDefault();

            localStorage.setItem("isLoggedIn", "true");

            alert("Signup successful! Please sign in.");

            document.getElementById("signin").checked = true;
        });

        // LOGIN
        document.getElementById("login-form").addEventListener("submit", function (e) {
            e.preventDefault();

            if (localStorage.getItem("isLoggedIn") === "true") {

                alert("Login successful!");

                let redirect = localStorage.getItem("redirectAfterLogin");

                if (redirect) {
                    localStorage.removeItem("redirectAfterLogin");
                    window.location.href = redirect;
                } else {
                    window.location.href = "main_page.html";
                }

            } else {
                alert("Please sign up first!");
            }
        });

    </script>

</body>

</html>
