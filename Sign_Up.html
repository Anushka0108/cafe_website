<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Coffee - Login</title>
    <link rel="stylesheet" href="sign_up.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-header">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=800">
        <div class="overlay-text">
            <h1>Cafe Coffee</h1>
        </div>
    </div>

    <div class="auth-tabs">

        <input type="radio" name="auth" id="signin" checked>
        <input type="radio" name="auth" id="signup">

        <div class="tab-links">
            <label for="signin">Sign In</label>
            <label for="signup">Sign Up</label>
        </div>

        <div class="form-wrapper">

            <!-- LOGIN -->
            <form class="auth-form" id="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button class="auth-btn">Welcome Back</button>
            </form>

            <!-- SIGNUP -->
            <form class="auth-form" id="register-form">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Address">
                <input type="text" placeholder="Phone Number">
                <input type="password" placeholder="Create Password" required>
                <button class="auth-btn">Join Now</button>
            </form>

        </div>
    </div>
</div>

<!-- ✅ SINGLE SCRIPT HERE -->
<script>
// ================= SIGNUP =================
document.getElementById("register-form").addEventListener("submit", function(e){
    e.preventDefault();

    let fullName = document.querySelector("#register-form input[placeholder='Full Name']").value.trim();
    let email = document.querySelector("#register-form input[placeholder='Email']").value.trim();
    let address = document.querySelector("#register-form input[placeholder='Address']").value.trim();
    let phone = document.querySelector("#register-form input[placeholder='Phone Number']").value.trim();
    let password = document.querySelector("#register-form input[placeholder='Create Password']").value.trim();

    // Name validation
    let namePattern = /^[A-Za-z\s]+$/;
    if(!namePattern.test(fullName)){
        alert("Invalid name!");
        return;
    }

    // Address validation
    let addressPattern = /^[A-Za-z\s,]+$/;
    if(address && !addressPattern.test(address)){
        alert("Invalid address!");
        return;
    }

    // Phone validation
    let phonePattern = /^[0-9]{10}$/;
    if(!phonePattern.test(phone)){
        alert("Invalid phone number!");
        return;
    }

    // Password validation
    if(password.length !== 6){
        alert("Password must be exactly 6 characters!");
        return;
    }

    // ✅ Store data
    localStorage.setItem("userName", fullName);
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", password);

    alert("Signup successful! Please sign in.");

    // switch to signin tab
    document.getElementById("signin").checked = true;

    // clear form
    document.getElementById("register-form").reset();
});


// ================= SIGNIN =================
document.getElementById("login-form").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.querySelector("#login-form input[type='email']").value.trim();
    let password = document.querySelector("#login-form input[type='password']").value.trim();

    let storedEmail = localStorage.getItem("userEmail");
    let storedPassword = localStorage.getItem("userPassword");

    if(email === storedEmail && password === storedPassword){
        localStorage.setItem("isLoggedIn", "true");

        alert("Login successful!");

        // ✅ redirect
        window.location.href = "main_page.html";
    } else {
        alert("Invalid email or password!");
    }

    // clear form
    document.getElementById("login-form").reset();
});
</script>
</body>
</html>
