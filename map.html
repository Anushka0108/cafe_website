<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Locator</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="website_style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h1>CoffeeHouse</h1>
    <div class="links">
      <a href="main_page.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="map.html" class="active">Store Locator</a>
      <a href="Sign_Up.html">Sign In</a>
      <a href="cart.html">🛒</a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="header">Find a CoffeeHouse Café</div>

  <!-- SEARCH BOX -->
  <input type="text" id="searchInput" placeholder="Search location...">

  <!-- STORE LIST -->
  <div class="store-list">

    <!-- STORE 1 -->
    <div class="store" data-name="baga beach">
      <h3>Baga Beach</h3>
      <p>Goa</p>
      ⭐ 4.6 · Open

      <div class="badges">
        <span class="badge">Pickup</span>
        <span class="badge">Delivery</span>
      </div>

      <div class="actions">
        <a href="https://www.google.com/maps/dir/?api=1&destination=15.5557,73.7517" target="_blank">
          Get Directions
        </a>
      </div>
    </div>

    <!-- STORE 2 -->
    <div class="store" data-name="calangute">
      <h3>Calangute</h3>
      <p>North Goa</p>
      ⭐ 4.5 · Open

      <div class="badges">
        <span class="badge">Pickup</span>
      </div>

      <div class="actions">
        <a href="https://www.google.com/maps/dir/?api=1&destination=15.5494,73.7553" target="_blank">
          Get Directions
        </a>
      </div>
    </div>

  </div>

  <!-- SEARCH SCRIPT -->
  <script>
    const searchInput = document.getElementById("searchInput");
    const stores = document.querySelectorAll(".store");

    searchInput.addEventListener("keyup", function () {
      const value = this.value.toLowerCase();

      stores.forEach(store => {
        const name = store.getAttribute("data-name");

        if (name.includes(value)) {
          store.style.display = "block";
        } else {
          store.style.display = "none";
        }
      });
    });
  </script>

</body>
</html>
